<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Soft cream background -->
  <rect width="512" height="512" fill="#FBF6EC"/>
  <!-- Subtle frame -->
  <rect x="14" y="14" width="484" height="484" rx="84" fill="#F4ECD9" stroke="#E5D4AA" stroke-width="3"/>

  <!-- Hill -->
  <path d="M -20,420 Q 100,360 200,400 Q 300,440 380,400 Q 460,370 540,420 L 540,520 L -20,520 Z" fill="#9CB876"/>
  <path d="M -20,440 Q 120,400 240,425 Q 360,450 540,440 L 540,520 L -20,520 Z" fill="#7B9A6E"/>

  <!-- Sun rays -->
  <g transform="translate(256 240)" opacity="0.85">
    <g fill="#E5B057">
      <path d="M -8,-130 L 0,-150 L 8,-130 Z"/>
      <path d="M -8,130 L 0,150 L 8,130 Z"/>
      <path d="M 130,-8 L 150,0 L 130,8 Z"/>
      <path d="M -130,-8 L -150,0 L -130,8 Z"/>
      <path d="M 92,-92 L 110,-110 L 105,-92 Z" transform="rotate(45)"/>
      <path d="M 92,-92 L 110,-110 L 105,-92 Z" transform="rotate(135)"/>
      <path d="M 92,-92 L 110,-110 L 105,-92 Z" transform="rotate(225)"/>
      <path d="M 92,-92 L 110,-110 L 105,-92 Z" transform="rotate(315)"/>
    </g>
  </g>

  <!-- Sunflower stem -->
  <path d="M 256,460 Q 252,400 256,340 Q 260,280 256,240" stroke="#5C7A40" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Leaves on stem -->
  <path d="M 256,360 Q 220,350 200,370 Q 220,380 256,370 Z" fill="#7B9A6E" stroke="#5C7A40" stroke-width="2"/>
  <path d="M 256,400 Q 290,395 312,415 Q 290,420 256,410 Z" fill="#7B9A6E" stroke="#5C7A40" stroke-width="2"/>

  <!-- Sunflower petals (back layer) -->
  <g transform="translate(256 230)">
    <g fill="#F0B543" stroke="#A86420" stroke-width="2">
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(0)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(30)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(60)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(90)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(120)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(150)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(180)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(210)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(240)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(270)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(300)"/>
      <ellipse cx="0" cy="-92" rx="22" ry="58" transform="rotate(330)"/>
    </g>
    <!-- front petals (lighter, offset rotation) -->
    <g fill="#F5C460" stroke="#A86420" stroke-width="1.5" opacity="0.95">
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(15)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(45)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(75)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(105)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(135)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(165)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(195)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(225)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(255)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(285)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(315)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="44" transform="rotate(345)"/>
    </g>
  </g>

  <!-- Sunflower centre -->
  <circle cx="256" cy="230" r="58" fill="#5C3A1F" stroke="#3D2A18" stroke-width="3"/>
  <circle cx="256" cy="230" r="48" fill="#7A4D2A"/>
  <!-- Seed pattern -->
  <g fill="#3D2A18">
    <circle cx="240" cy="218" r="2.5"/>
    <circle cx="256" cy="212" r="2.5"/>
    <circle cx="272" cy="218" r="2.5"/>
    <circle cx="280" cy="234" r="2.5"/>
    <circle cx="270" cy="248" r="2.5"/>
    <circle cx="252" cy="252" r="2.5"/>
    <circle cx="234" cy="246" r="2.5"/>
    <circle cx="232" cy="232" r="2.5"/>
    <circle cx="248" cy="234" r="2.5"/>
    <circle cx="262" cy="234" r="2.5"/>
    <circle cx="246" cy="222" r="2.2"/>
    <circle cx="266" cy="226" r="2.2"/>
  </g>
</svg>
