<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Soft cream background -->
  <rect width="512" height="512" fill="#FBF6EC"/>
  <!-- Subtle frame -->
  <rect x="14" y="14" width="484" height="484" rx="84" fill="#F4ECD9" stroke="#E5D4AA" stroke-width="3"/>

  <!-- Sky tint at top -->
  <rect x="14" y="14" width="484" height="180" rx="84" fill="#FDD8C7" opacity="0.35"/>

  <!-- Distant hills -->
  <path d="M -20,420 Q 100,360 200,400 Q 300,440 380,400 Q 460,370 540,420 L 540,520 L -20,520 Z" fill="#9CB876"/>
  <path d="M -20,440 Q 120,400 240,425 Q 360,450 540,440 L 540,520 L -20,520 Z" fill="#7B9A6E"/>

  <!-- Sun behind -->
  <g transform="translate(380 150)" opacity="0.85">
    <circle r="42" fill="#FFE9A8"/>
    <circle r="32" fill="#FFD580"/>
    <circle r="22" fill="#FFCB6E"/>
  </g>

  <!-- Soil mound at base -->
  <ellipse cx="256" cy="465" rx="120" ry="22" fill="#6B4F32"/>
  <ellipse cx="256" cy="460" rx="120" ry="20" fill="#7E5C3D"/>
  <circle cx="180" cy="462" r="2" fill="#5C3A1F"/>
  <circle cx="320" cy="466" r="2" fill="#5C3A1F"/>
  <circle cx="240" cy="468" r="1.5" fill="#5C3A1F"/>
  <circle cx="290" cy="463" r="1.5" fill="#5C3A1F"/>

  <!-- ===== CORN STALK ===== -->
  <path d="M 256,460 Q 250,380 256,300 Q 262,220 256,140" stroke="#7AA85C" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 252,460 Q 246,380 252,300 Q 258,220 252,140" stroke="#9DC078" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>
  <line x1="240" y1="380" x2="272" y2="380" stroke="#5C8048" stroke-width="2.5"/>
  <line x1="241" y1="320" x2="271" y2="320" stroke="#5C8048" stroke-width="2.5"/>
  <line x1="242" y1="260" x2="270" y2="260" stroke="#5C8048" stroke-width="2.5"/>
  <line x1="244" y1="200" x2="268" y2="200" stroke="#5C8048" stroke-width="2.5"/>

  <!-- Long corn leaves, alternating sides -->
  <path d="M 260,400 Q 320,370 380,330 Q 360,355 340,380 Q 310,410 268,408 Z"
        fill="#7AA85C" stroke="#5C8048" stroke-width="2.5"/>
  <path d="M 268,402 Q 310,385 360,355" stroke="#5C8048" stroke-width="1.5" fill="none" opacity="0.6"/>

  <path d="M 252,420 Q 190,395 130,360 Q 155,385 175,410 Q 210,440 246,425 Z"
        fill="#94BC68" stroke="#5C8048" stroke-width="2.5"/>
  <path d="M 246,420 Q 200,405 150,378" stroke="#5C8048" stroke-width="1.5" fill="none" opacity="0.6"/>

  <path d="M 262,330 Q 320,310 370,260 Q 350,290 330,315 Q 305,345 270,338 Z"
        fill="#7AA85C" stroke="#5C8048" stroke-width="2.5"/>
  <path d="M 270,335 Q 310,318 350,285" stroke="#5C8048" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Top leaves curling up -->
  <path d="M 254,180 Q 230,140 200,110 Q 220,140 235,170 Q 245,185 254,185 Z"
        fill="#94BC68" stroke="#5C8048" stroke-width="2.5"/>
  <path d="M 258,180 Q 280,140 310,110 Q 295,140 280,170 Q 268,185 258,185 Z"
        fill="#7AA85C" stroke="#5C8048" stroke-width="2.5"/>
  <!-- Tassel/silk at top -->
  <path d="M 256,140 Q 250,120 248,100 M 256,140 Q 256,118 256,98 M 256,140 Q 262,120 264,100 M 256,140 Q 244,128 232,118 M 256,140 Q 268,128 280,118"
        stroke="#F5C66C" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ===== CORN COB (mid-stalk left, the hero of the icon) ===== -->
  <g transform="translate(195 290) rotate(-15)">
    <!-- Outer husk leaves pulled back -->
    <path d="M 0,0 Q -25,-90 -10,-130 Q 5,-95 10,-50 Q 5,-15 0,0 Z"
          fill="#94BC68" stroke="#5C8048" stroke-width="2.5"/>
    <path d="M 0,0 Q 35,-80 25,-128 Q 15,-95 18,-50 Q 12,-15 0,0 Z"
          fill="#7AA85C" stroke="#5C8048" stroke-width="2.5"/>
    <path d="M -8,-20 Q -15,-70 -10,-120" stroke="#5C8048" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M 12,-25 Q 18,-75 22,-118" stroke="#5C8048" stroke-width="1.2" fill="none" opacity="0.6"/>

    <!-- Cob body -->
    <ellipse cx="6" cy="-65" rx="20" ry="48" fill="#FFCB3F" stroke="#C8901C" stroke-width="2.5"/>
    <ellipse cx="-2" cy="-65" rx="9" ry="46" fill="#FFE9A8" opacity="0.55"/>
    <ellipse cx="14" cy="-65" rx="6" ry="44" fill="#E89F1C" opacity="0.4"/>

    <!-- Kernel grid -->
    <g fill="#F5C66C" stroke="#A86420" stroke-width="0.8">
      <ellipse cx="-4" cy="-100" rx="3.5" ry="4"/>
      <ellipse cx="6" cy="-102" rx="3.5" ry="4"/>
      <ellipse cx="16" cy="-100" rx="3.5" ry="4"/>
      <ellipse cx="-9" cy="-92" rx="4" ry="4.2"/>
      <ellipse cx="0" cy="-93" rx="4" ry="4.2"/>
      <ellipse cx="10" cy="-93" rx="4" ry="4.2"/>
      <ellipse cx="20" cy="-92" rx="4" ry="4.2"/>
      <ellipse cx="-12" cy="-82" rx="4.2" ry="4.5"/>
      <ellipse cx="-3" cy="-83" rx="4.2" ry="4.5"/>
      <ellipse cx="6" cy="-83" rx="4.2" ry="4.5"/>
      <ellipse cx="15" cy="-83" rx="4.2" ry="4.5"/>
      <ellipse cx="23" cy="-82" rx="4.2" ry="4.5"/>
      <ellipse cx="-13" cy="-72" rx="4.3" ry="4.5"/>
      <ellipse cx="-4" cy="-73" rx="4.3" ry="4.5"/>
      <ellipse cx="5" cy="-73" rx="4.3" ry="4.5"/>
      <ellipse cx="14" cy="-73" rx="4.3" ry="4.5"/>
      <ellipse cx="24" cy="-72" rx="4.3" ry="4.5"/>
      <ellipse cx="-13" cy="-62" rx="4.3" ry="4.5"/>
      <ellipse cx="-4" cy="-63" rx="4.3" ry="4.5"/>
      <ellipse cx="5" cy="-63" rx="4.3" ry="4.5"/>
      <ellipse cx="14" cy="-63" rx="4.3" ry="4.5"/>
      <ellipse cx="24" cy="-62" rx="4.3" ry="4.5"/>
      <ellipse cx="-12" cy="-52" rx="4.2" ry="4.5"/>
      <ellipse cx="-3" cy="-53" rx="4.2" ry="4.5"/>
      <ellipse cx="6" cy="-53" rx="4.2" ry="4.5"/>
      <ellipse cx="15" cy="-53" rx="4.2" ry="4.5"/>
      <ellipse cx="23" cy="-52" rx="4.2" ry="4.5"/>
      <ellipse cx="-9" cy="-42" rx="4" ry="4.2"/>
      <ellipse cx="0" cy="-43" rx="4" ry="4.2"/>
      <ellipse cx="10" cy="-43" rx="4" ry="4.2"/>
      <ellipse cx="20" cy="-42" rx="4" ry="4.2"/>
      <ellipse cx="-4" cy="-32" rx="3.5" ry="4"/>
      <ellipse cx="6" cy="-32" rx="3.5" ry="4"/>
      <ellipse cx="16" cy="-32" rx="3.5" ry="4"/>
    </g>

    <!-- Highlight dots on a few kernels -->
    <g fill="#FFFAEB" opacity="0.7">
      <circle cx="-2" cy="-95" r="0.8"/>
      <circle cx="8" cy="-85" r="0.8"/>
      <circle cx="-2" cy="-75" r="0.8"/>
      <circle cx="12" cy="-65" r="0.8"/>
      <circle cx="-2" cy="-55" r="0.8"/>
      <circle cx="8" cy="-45" r="0.8"/>
    </g>

    <!-- Silk hairs at the top -->
    <path d="M 5,-110 Q 0,-128 -5,-138 M 8,-110 Q 8,-130 6,-145 M 12,-110 Q 18,-128 22,-138 M 0,-110 Q -8,-125 -16,-132"
          stroke="#E89B5C" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 5,-110 Q 2,-126 -2,-134" stroke="#F5C66C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
